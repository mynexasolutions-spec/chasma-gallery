{% extends "base.html" %}

{% block title %}Login – ChasmaGallery{% endblock %}

{% block content %}
<div style="min-height:80vh; display:flex; align-items:center; justify-content:center; padding:2rem;">
  <div class="glass" style="width:100%; max-width:420px; padding:2.5rem; border-radius:2rem;">
    <h2 style="text-align:center; margin-bottom:0.5rem; font-size:1.8rem;">Welcome Back</h2>
    <p style="text-align:center; color:var(--text-muted); margin-bottom:2rem; font-size:0.95rem;">Sign in to your account</p>

    <form method="post" action="{{ url_for('auth.login', next=request.args.get('next', '')) }}" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div style="margin-bottom:1.25rem;">
        <label style="display:block; font-weight:600; margin-bottom:0.5rem; font-size:0.9rem; color:var(--text-muted);">Email</label>
        <input type="email" name="email" autocomplete="email" required placeholder="you@example.com"
          style="width:100%; padding:0.875rem 1rem; background:rgba(255,255,255,0.05); border:1px solid var(--border-glass); border-radius:0.75rem; color:var(--text-main); font-size:1rem; outline:none;" />
      </div>

      <div style="margin-bottom:1.75rem;">
        <label style="display:block; font-weight:600; margin-bottom:0.5rem; font-size:0.9rem; color:var(--text-muted);">Password</label>
        <div style="position:relative;">
          <input type="password" name="password" id="pwdInput" autocomplete="current-password" required placeholder="Your password"
            style="width:100%; padding:0.875rem 1rem; background:rgba(255,255,255,0.05); border:1px solid var(--border-glass); border-radius:0.75rem; color:var(--text-main); font-size:1rem; outline:none; padding-right:3rem;" />
          <button type="button" onclick="togglePwd()" style="position:absolute; right:0.75rem; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1rem;">👁</button>
        </div>
      </div>

      <button type="submit" style="width:100%; padding:1rem; background:var(--primary); color:white; border:none; border-radius:0.75rem; font-weight:700; font-size:1rem; cursor:pointer; transition:background 0.3s;">Sign In</button>
    </form>

    <p style="text-align:center; margin-top:1.5rem; color:var(--text-muted); font-size:0.9rem;">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}" style="color:var(--primary); font-weight:600;">Create one</a>
    </p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  function togglePwd() {
    const inp = document.getElementById('pwdInput');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }
</script>
{% endblock %}
